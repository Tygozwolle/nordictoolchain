name: Docker Image CI

on:
  push:
  pull_request:
  workflow_dispatch: 
    
# Grant permission to upload images to the repository packages
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push to GHCR
      run: |
        # GitHub Packages requires the format: ghcr.io/owner/image-name
        IMAGE_ID=ghcr.io/${{ github.repository_owner }}/nordictoolchain
        
        # Convert to lowercase (GHCR requirement)
        IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
        VERSION=$(date +%s)

        echo "Pushing to $IMAGE_ID"

        docker build . --file Dockerfile --tag $IMAGE_ID:$VERSION --tag $IMAGE_ID:latest
        
        docker push $IMAGE_ID:$VERSION
        docker push $IMAGE_ID:latest
